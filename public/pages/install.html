<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Install ADAN</title>

    <link rel="stylesheet" href="../styles/elements.css">
    <link rel="stylesheet" href="../styles/classes.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>

    <link rel="icon" href="../assets/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body class="geist">
    <div class="unselect">
        <nav class="navbar install-navbar">
            <!-- <a class="geist" href="https://install.adan.sh/" target="_blank">Install</a> -->
            <a class="logo-link" href="https://adan.sh"><img width="50" height="50" src="../assets/logo.png" alt="ADAN logo"></img></a>
            <a class="geist" href="https://docs.adan.sh/" target="_blank">Documentation</a>
            <a class="geist" href="https://github.com/Cappucina/ADAN.git" target="_blank">Source</a>
        </nav>
    </div>

    <main class="install-doc">
        <header class="install-doc-header">
            <h1>ADAN Installation Guide</h1>
        </header>

        <section class="install-doc-section">
            <div id="install-markdown" class="markdown-body"></div>
        </section>
    </main>

    <script>
        const markdownRoot = document.getElementById("install-markdown");

        const slugify = (text) => text
            .toLowerCase()
            .trim()
            .replace(/[^a-z0-9\s-]/g, "")
            .replace(/\s+/g, "-")
            .replace(/-+/g, "-");

        marked.setOptions({
            gfm: true,
            breaks: true
        });

        const renderMarkdown = (markdownText) => {
            const unsafeHtml = marked.parse(markdownText.trim());
            const safeHtml = DOMPurify.sanitize(unsafeHtml);
            markdownRoot.innerHTML = safeHtml;

            markdownRoot.querySelectorAll("h1, h2, h3, h4, h5, h6").forEach((heading) => {
                if (!heading.id) {
                    heading.id = slugify(heading.textContent);
                }
            });

            if (window.Prism) {
                Prism.highlightAllUnder(markdownRoot);
            }
        };

        fetch("./install.md")
            .then((response) => {
                if (!response.ok) {
                    throw new Error("Failed to load install markdown content");
                }
                return response.text();
            })
            .then((markdownText) => {
                renderMarkdown(markdownText);
            })
            .catch(() => {
                markdownRoot.innerHTML = "<p>Unable to load installation content right now.</p>";
            });
    </script>
</body>

</html>
